<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coffee - Contáctenos</title>
  <link rel="stylesheet" href="./Css/contactenos.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <a href="#" class="logo">☕ Coffee</a>

    <ul class="nav-links" id="navLinks">
      <li><a href="./index.html" class="nav-link">Home</a></li>
      <li><a href="./menu.html" class="nav-link">Menu</a></li>
      <li><a href="./galeria.html" class="nav-link">Galeria</a></li>
      <li><a href="./contactenos.html" class="nav-link">Contactenos</a></li>
    </ul>

    <i class="fas fa-shopping-cart cart-icon"></i>
    <button class="hamburger" id="hamburger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- CONTACT SECTION -->
  <section class="contact-section">
    <h2>Contact Us</h2>

    <div class="contact-layout">

      <!-- Información -->
      <div class="contact-info">
        <div class="info-item">
          <i class="fas fa-book-open"></i>
          <span>123 Camsite avenue, wilderness, CA 98765</span>
        </div>
        <div class="info-item">
          <i class="fas fa-envelope"></i>
          <span>info@coffeeshopwebsite.com</span>
        </div>
        <div class="info-item">
          <i class="fas fa-phone"></i>
          <span>(123) 4456-78909</span>
        </div>
        <div class="info-item">
          <i class="fas fa-clock"></i>
          <span>Monday-Friday: 9:00 AM - 5 PM</span>
        </div>
        <div class="info-item">
          <i class="fas fa-clock"></i>
          <span>Saturday: 10:00 AM - 3:00 PM</span>
        </div>
        <div class="info-item">
          <i class="fas fa-clock"></i>
          <span>Sunday: Closed</span>
        </div>
        <div class="info-item">
          <i class="fas fa-globe"></i>
          <span>www.codingneplueb.com</span>
        </div>
      </div>

      <!-- Formulario -->
      <div class="contact-form">
        <input type="text" placeholder="YOUR NAME" />
        <input type="email" placeholder="YOUR GMAIL" />
        <textarea placeholder="YOUR MESSAGE"></textarea>
        <button class="btn-enviar">Enviar</button>
      </div>

    </div>
  </section>

  <script>
    function toggleMenu() {
      document.getElementById('navLinks').classList.toggle('open');
      document.getElementById('hamburger').classList.toggle('open');
    }
  </script>

</body>
</html>
