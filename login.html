<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sitio de Cafe</title>
    <link rel="stylesheet" href="./Css/login.css" />
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Poppins:wght@300;400;700&family=Ribeye&family=Lato:wght@400;700&display=swap" rel="stylesheet"/>
    <script src="https://kit.fontawesome.com/bdc4e23805.js" crossorigin="anonymous"></script>
</head>
<body>

    <header>
        <nav class="navbar">
            <a href="index.html" class="nav-logo">
                <span class="logo-emoji">☕</span>
                <span class="nav-text">Coffee</span>
            </a>

            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="menu.html" class="nav-link">Menu</a></li>
                <li><a href="galeria.html" class="nav-link">Galería</a></li>
                <li><a href="contacto.html" class="nav-link">Contáctenos</a></li>
            </ul>

            <div class="nav-icons">
                <i class="fas fa-user nav-link" style="margin-right: 15px; cursor: pointer;"></i>
                <div class="carrito" onclick="window.location.href='carrito.html'">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="contador">0</span>
                </div>
            </div>
        </nav>
    </header>

    <main class="main">
        <div class="login-card">
            <div class="avatar-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" width="38" height="38">
                    <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
                </svg>
            </div>

            <h1 class="card-title">¡Bienvenido de vuelta!</h1>
            <p class="card-subtitle">Inicia sesión en tu cuenta de Coffee</p>

            <form class="login-form">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@correo.com" />
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" />
                        <button type="button" class="toggle-pw" onclick="togglePassword()">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-label">
                        <input type="checkbox" id="remember" /> Recordarme
                    </label>
                    <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-login">Iniciar sesión</button>

                <div class="divider">
                    <span class="divider-line"></span>
                    <span class="divider-text">O continúa con</span>
                    <span class="divider-line"></span>
                </div>

                <div class="social-buttons">
                    <button type="button" class="btn-social">
                        <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18" alt=""> Google
                    </button>
                    <button type="button" class="btn-social">
                        <i class="fab fa-facebook" style="color: #1877F2; font-size: 18px;"></i> Facebook
                    </button>
                </div>

                <p class="register-prompt">
                    ¿No tienes cuenta? <a href="./registro.html">Regístrate aquí</a>
                </p>
            </form>
        </div>
    </main>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
