<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sitio de Cafe</title>
  <link rel="stylesheet" href="./Css/registro.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <button class="hamburger" id="hamburger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>

    <a href="./index.html" class="navbar__brand">
      <span class="navbar__icon">☕</span>
      <span class="navbar__name">Coffee</span>
    </a>

    <ul class="navbar__links" id="navLinks">
      <li><a href="./index.html">Home</a></li>
      <li><a href="./menu.html">Menú</a></li>
      <li><a href="./galeria.html">Galeria</a></li>
      <li><a href="./contactenos.html">Contáctenos</a></li>
    </ul>

    <a href="./carrito.html" class="cart-icon">
      <i class="fas fa-shopping-cart"></i>
    </a>
  </nav>

  <!-- REGISTRO -->
  <main class="register-main">
    <div class="register-card">

      <div class="register-header">
        <span class="register-emoji">☕</span>
        <h1 class="register-title">Crear Cuenta</h1>
        <p class="register-subtitle">Únete a nuestra comunidad cafetera</p>
      </div>

      <form class="register-form" onsubmit="return false;">

        <!-- Nombre -->
        <div class="form-group">
          <label for="nombre">Nombre completo</label>
          <div class="input-wrapper">
            <i class="fas fa-user input-icon"></i>
            <input type="text" id="nombre" placeholder="Tu nombre completo" />
          </div>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="email" placeholder="tucorreo@ejemplo.com" />
          </div>
        </div>

        <!-- Teléfono -->
        <div class="form-group">
          <label for="telefono">Teléfono</label>
          <div class="input-wrapper">
            <i class="fas fa-phone input-icon"></i>
            <input type="tel" id="telefono" placeholder="+57 300 000 0000" />
          </div>
        </div>

        <!-- Contraseña -->
        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="password" placeholder="Mínimo 8 caracteres" />
            <button type="button" class="toggle-pass" onclick="togglePass('password', this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <!-- Confirmar Contraseña -->
        <div class="form-group">
          <label for="confirm-password">Confirmar contraseña</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="confirm-password" placeholder="Repite tu contraseña" />
            <button type="button" class="toggle-pass" onclick="togglePass('confirm-password', this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <!-- Términos -->
        <div class="form-check">
          <input type="checkbox" id="terminos" />
          <label for="terminos">Acepto los <a href="#">términos y condiciones</a></label>
        </div>

        <button type="submit" class="btn-register">Crear Cuenta</button>

        <p class="login-link">¿Ya tienes cuenta? <a href="./login.html">Inicia sesión</a></p>

      </form>
    </div>
  </main>

  <script>
    function toggleMenu() {
      document.getElementById('navLinks').classList.toggle('open');
      document.getElementById('hamburger').classList.toggle('open');
    }

    function togglePass(id, btn) {
      const input = document.getElementById(id);
      const icon = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }
  </script>

</body>
</html>
